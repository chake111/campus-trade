name: Quality Gate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: campus-trade-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: campus-trade-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
